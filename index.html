<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billie Jean Dance — MJ Rhythm Game</title>
<style>
  :root{
    --lane-w: 90px;
    --gap: 14px;
    --hit-line: 120px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:"Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(circle at 50% 0%, #2a2350 0%, #0d0b1f 55%, #050410 100%);
    color:#fff;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    user-select:none;
  }

  #game{
    position:relative;
    width:520px;
    height:720px;
    max-height:98vh;
    background:linear-gradient(180deg, rgba(20,16,45,.6), rgba(8,6,20,.9));
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
  }

  #stage{
    position:absolute;
    top:0; left:0; right:0;
    height:340px;
    overflow:hidden;
    border-bottom:2px solid rgba(255,255,255,.06);
  }
  #floor{
    position:absolute;
    bottom:0; left:50%;
    width:600px; height:180px;
    transform:translateX(-50%);
    background:
      radial-gradient(ellipse at center bottom, rgba(255,225,120,.28), transparent 70%);
  }
  #spot{
    position:absolute;
    top:-40px; left:50%;
    width:340px; height:400px;
    transform:translateX(-50%);
    background:linear-gradient(180deg, rgba(255,240,180,.16), transparent 75%);
    clip-path:polygon(42% 0, 58% 0, 100% 100%, 0% 100%);
    pointer-events:none;
  }

  #mj{
    position:absolute;
    bottom:8px; left:50%;
    transform:translateX(-50%);
    font-size:120px;
    line-height:1;
    filter:drop-shadow(0 8px 14px rgba(0,0,0,.5));
    transition:transform .12s ease;
  }
  #mj .hat{
    position:absolute;
    top:-6px; left:50%;
    transform:translateX(-50%);
    font-size:40px;
  }
  .pose-idle{ animation:idle 1s ease-in-out infinite; }
  @keyframes idle{ 0%,100%{ transform:translateX(-50%) translateY(0);} 50%{ transform:translateX(-50%) translateY(-6px);} }
  .pose-left{ transform:translateX(-50%) rotate(-14deg) translateX(-14px) !important; }
  .pose-right{ transform:translateX(-50%) rotate(14deg) translateX(14px) !important; }
  .pose-up{ transform:translateX(-50%) translateY(-26px) scale(1.08) !important; }
  .pose-down{ transform:translateX(-50%) translateY(6px) scale(.94) !important; }
  .pose-miss{ transform:translateX(-50%) rotate(0) translateY(0) !important; filter:grayscale(.6) drop-shadow(0 8px 14px rgba(0,0,0,.5)); }

  #field{
    position:absolute;
    top:340px; bottom:0; left:0; right:0;
  }
  #lanes{
    position:absolute;
    top:0; bottom:0; left:50%;
    transform:translateX(-50%);
    width:calc(var(--lane-w)*4 + var(--gap)*3);
    display:flex;
    gap:var(--gap);
  }
  .lane{
    position:relative;
    width:var(--lane-w);
    background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    border-left:1px solid rgba(255,255,255,.04);
    border-right:1px solid rgba(255,255,255,.04);
  }

  .receptor{
    position:absolute;
    bottom:var(--hit-line);
    left:50%; transform:translateX(-50%);
    width:74px; height:74px;
    border-radius:16px;
    border:3px solid rgba(255,255,255,.35);
    display:flex; align-items:center; justify-content:center;
    font-size:36px; font-weight:700;
    color:rgba(255,255,255,.55);
    background:rgba(255,255,255,.03);
  }
  .receptor.flash{
    border-color:#ffe36b;
    background:rgba(255,227,107,.25);
    box-shadow:0 0 26px rgba(255,227,107,.7);
    color:#fff;
    transform:translateX(-50%) scale(1.12);
  }
  .hitline{
    position:absolute;
    bottom:calc(var(--hit-line) + 37px);
    left:-4px; right:-4px;
    height:2px; background:rgba(255,255,255,.12);
  }

  .note{
    position:absolute;
    left:50%; transform:translateX(-50%);
    width:70px; height:70px;
    border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    font-size:34px; font-weight:800; color:#111;
    will-change:top;
  }
  .n-left  { background:linear-gradient(180deg,#7ce7ff,#39a0ff); }
  .n-down  { background:linear-gradient(180deg,#b5ff7c,#39c46a); }
  .n-up    { background:linear-gradient(180deg,#ffd27c,#ff9a39); }
  .n-right { background:linear-gradient(180deg,#ff9ce0,#ff478f); }

  #hud{
    position:absolute; top:12px; left:0; right:0;
    display:flex; justify-content:space-between;
    padding:0 18px; z-index:5;
    text-shadow:0 2px 6px rgba(0,0,0,.6);
  }
  #hud .box{ text-align:center; }
  #hud .lbl{ font-size:11px; letter-spacing:2px; opacity:.6; }
  #hud .val{ font-size:26px; font-weight:800; }
  #combo{
    position:absolute; top:120px; left:0; right:0;
    text-align:center; z-index:5;
    font-size:40px; font-weight:900;
    color:#ffe36b;
    text-shadow:0 2px 12px rgba(0,0,0,.7);
    opacity:0; transition:opacity .2s;
    pointer-events:none;
  }
  #judge{
    position:absolute; top:250px; left:0; right:0;
    text-align:center; z-index:6;
    font-size:34px; font-weight:900; letter-spacing:1px;
    opacity:0;
    pointer-events:none;
  }

  #overlay{
    position:absolute; inset:0; z-index:20;
    background:rgba(6,4,18,.82);
    backdrop-filter:blur(4px);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:30px;
  }
  #overlay h1{
    font-size:40px; font-weight:900;
    background:linear-gradient(90deg,#ffe36b,#ff8fd0,#7ce7ff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:6px;
  }
  #overlay p{ opacity:.8; margin-bottom:6px; line-height:1.5; }
  .keys{ margin:18px 0; font-size:14px; opacity:.85; }
  .keys b{ display:inline-block; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2);
           border-radius:8px; padding:6px 12px; margin:3px; min-width:44px; }
  button{
    margin-top:14px;
    background:linear-gradient(90deg,#ff478f,#ff9a39);
    color:#fff; border:0; border-radius:40px;
    padding:14px 40px; font-size:18px; font-weight:800;
    cursor:pointer; letter-spacing:1px;
    box-shadow:0 8px 24px rgba(255,71,143,.4);
    transition:transform .1s;
  }
  button:active{ transform:scale(.95); }
  .hidden{ display:none !important; }
  #final{ font-size:15px; line-height:1.7; margin-top:8px; }
  #final .big{ font-size:30px; font-weight:900; color:#ffe36b; }
</style>
</head>
<body>
<div id="game">

  <div id="hud">
    <div class="box"><div class="lbl">PONTOS</div><div class="val" id="score">0</div></div>
    <div class="box"><div class="lbl">COMBO MAX</div><div class="val" id="maxcombo">0</div></div>
    <div class="box"><div class="lbl">PRECISÃO</div><div class="val" id="acc">100%</div></div>
  </div>

  <div id="stage">
    <div id="spot"></div>
    <div id="floor"></div>
    <div id="mj" class="pose-idle"><span class="hat">🎩</span>🕺</div>
  </div>

  <div id="combo"></div>
  <div id="judge"></div>

  <div id="field">
    <div id="lanes">
      <div class="lane" data-dir="left">
        <div class="hitline"></div><div class="receptor" data-dir="left">←</div>
      </div>
      <div class="lane" data-dir="down">
        <div class="hitline"></div><div class="receptor" data-dir="down">↓</div>
      </div>
      <div class="lane" data-dir="up">
        <div class="hitline"></div><div class="receptor" data-dir="up">↑</div>
      </div>
      <div class="lane" data-dir="right">
        <div class="hitline"></div><div class="receptor" data-dir="right">→</div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <h1>🕺 Billie Jean Dance</h1>
    <p>Acerte as setas no momento certo pro Michael continuar dançando!</p>
    <div class="keys">
      <b>←</b><b>↓</b><b>↑</b><b>→</b><br>
      <span style="font-size:12px">(ou A / S / W / D)</span>
    </div>
    <p style="font-size:13px;opacity:.65">Aperte a seta quando ela encostar no alvo iluminado.<br>Quanto mais preciso, mais pontos. Erre demais e ele para de dançar!</p>
    <button id="startBtn">COMEÇAR ▶</button>
    <div id="final" class="hidden"></div>
  </div>

</div>

<script>
(() => {
  const DIRS = ['left','down','up','right'];
  const KEYMAP = {
    ArrowLeft:'left', ArrowDown:'down', ArrowUp:'up', ArrowRight:'right',
    a:'left', s:'down', w:'up', d:'right',
    A:'left', S:'down', W:'up', D:'right'
  };
  const SYM = { left:'←', down:'↓', up:'↑', right:'→' };

  const field   = document.getElementById('field');
  const lanes   = {};
  const receptors = {};
  document.querySelectorAll('.lane').forEach(l => lanes[l.dataset.dir] = l);
  document.querySelectorAll('.receptor').forEach(r => receptors[r.dataset.dir] = r);

  const mj       = document.getElementById('mj');
  const scoreEl  = document.getElementById('score');
  const maxComboEl = document.getElementById('maxcombo');
  const accEl    = document.getElementById('acc');
  const comboEl  = document.getElementById('combo');
  const judgeEl  = document.getElementById('judge');
  const overlay  = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const finalEl  = document.getElementById('final');

  const NOTE_SIZE = 70;
  const HIT_LINE  = 120;
  let   FIELD_H   = field.clientHeight;
  const targetY   = () => FIELD_H - HIT_LINE - 37;

  const FALL_MS   = 1800;
  const PERFECT   = 55;
  const GOOD      = 110;

  let AC = null, masterGain = null;
  const BPM = 117;
  const beatSec = 60 / BPM;

  function initAudio(){
    AC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(AC.destination);
  }
  function kick(t){
    const o = AC.createOscillator(), g = AC.createGain();
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(48, t+0.12);
    g.gain.setValueAtTime(0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.22);
    o.connect(g).connect(masterGain); o.start(t); o.stop(t+0.25);
  }
  function snare(t){
    const noise = AC.createBufferSource();
    const buf = AC.createBuffer(1, AC.sampleRate*0.2, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length,2);
    noise.buffer = buf;
    const g = AC.createGain(); g.gain.value = 0.4;
    const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=1200;
    noise.connect(hp).connect(g).connect(masterGain); noise.start(t);
  }
  function hat(t){
    const noise = AC.createBufferSource();
    const buf = AC.createBuffer(1, AC.sampleRate*0.05, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1);
    noise.buffer = buf;
    const g = AC.createGain(); g.gain.value = 0.12;
    const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
    noise.connect(hp).connect(g).connect(masterGain); noise.start(t);
  }
  const BASS = [92.5, 92.5, 110, 92.5, 82.4, 92.5, 82.4, 73.4];
  function bass(t, f){
    const o = AC.createOscillator(), g = AC.createGain();
    o.type='sawtooth'; o.frequency.value = f;
    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.35, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+beatSec*0.9);
    o.connect(lp).connect(g).connect(masterGain); o.start(t); o.stop(t+beatSec);
  }
  function hitSound(perfect){
    if(!AC) return;
    const t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.value = perfect?1320:880;
    g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    o.connect(g).connect(masterGain); o.start(t); o.stop(t+0.13);
  }

  let running=false, notes=[], startTime=0, rafId=0;
  let beatIdx=0, nextBeatTime=0;
  let score=0, combo=0, maxCombo=0, hits=0, judged=0, missStreak=0;
  let songBeats=0;
  const SONG_LENGTH_BEATS = 128;

  function reset(){
    notes.forEach(n=>n.el.remove()); notes=[];
    score=0; combo=0; maxCombo=0; hits=0; judged=0; missStreak=0;
    beatIdx=0; songBeats=0;
    scoreEl.textContent='0'; maxComboEl.textContent='0'; accEl.textContent='100%';
    comboEl.style.opacity=0;
    setPose('idle');
  }

  function patternForBeat(b){
    const arr=[];
    if(b % 2 === 0) arr.push(DIRS[b/2 % 4 | 0]);
    else if(b % 4 === 3) arr.push(DIRS[(b+1)%4]);
    if(b>16 && b%8===0) arr.push(DIRS[(b/4+2)%4|0]);
    return [...new Set(arr)];
  }

  function spawnNote(dir, hitAt){
    const el=document.createElement('div');
    el.className='note n-'+dir;
    el.textContent=SYM[dir];
    el.style.top = (-NOTE_SIZE)+'px';
    lanes[dir].appendChild(el);
    notes.push({dir, hitAt, el, dead:false});
  }

  function setPose(p){
    mj.className = 'pose-'+p;
    if(p!=='idle' && p!=='miss'){
      clearTimeout(mj._t);
      mj._t=setTimeout(()=>{ if(running && missStreak<4) setPose('idle'); }, 220);
    }
  }

  function showJudge(txt,color){
    judgeEl.textContent=txt; judgeEl.style.color=color;
    judgeEl.style.opacity=1;
    judgeEl.style.transition='none';
    judgeEl.style.transform='scale(1.2)';
    requestAnimationFrame(()=>{
      judgeEl.style.transition='opacity .5s, transform .3s';
      judgeEl.style.opacity=0; judgeEl.style.transform='scale(1)';
    });
  }
  function updateCombo(){
    if(combo>maxCombo){ maxCombo=combo; maxComboEl.textContent=maxCombo; }
    if(combo>=4){
      comboEl.textContent=combo+' COMBO';
      comboEl.style.opacity=1;
    } else comboEl.style.opacity=0;
  }
  function updateAcc(){
    const a = judged? Math.round(hits/judged*100):100;
    accEl.textContent=a+'%';
  }

  function loop(ts){
    if(!running) return;
    const now = (AC.currentTime - startTime)*1000;

    while(nextBeatTime < AC.currentTime + 0.15 && songBeats < SONG_LENGTH_BEATS){
      const t = nextBeatTime;
      if(beatIdx%4===0 || beatIdx%4===2) kick(t);
      if(beatIdx%4===1 || beatIdx%4===3) snare(t);
      hat(t); hat(t+beatSec/2);
      bass(t, BASS[beatIdx % BASS.length]);
      patternForBeat(beatIdx).forEach(dir=>{
        const arriveMs = (t - startTime)*1000 + FALL_MS;
        spawnNote(dir, arriveMs);
      });
      beatIdx++; songBeats++;
      nextBeatTime += beatSec;
    }

    const tgt = targetY();
    for(const n of notes){
      if(n.dead) continue;
      const progress = 1 - (n.hitAt - now)/FALL_MS;
      const y = -NOTE_SIZE/2 + progress*(tgt + NOTE_SIZE/2);
      n.el.style.top = (y)+'px';
      if(now - n.hitAt > GOOD){
        n.dead=true; n.el.remove();
        registerMiss();
      }
    }
    notes = notes.filter(n=>!n.dead);

    if(songBeats>=SONG_LENGTH_BEATS && notes.length===0){
      endGame();
      return;
    }
    rafId=requestAnimationFrame(loop);
  }

  function registerMiss(){
    combo=0; judged++; missStreak++;
    updateCombo(); updateAcc();
    showJudge('MISS','#ff6a6a');
    setPose('miss');
    if(missStreak>=4){ mj.className='pose-miss'; }
  }

  function judgeHit(dir){
    const now = (AC.currentTime - startTime)*1000;
    let best=null, bestD=1e9;
    for(const n of notes){
      if(n.dead||n.dir!==dir) continue;
      const d=Math.abs(now-n.hitAt);
      if(d<bestD){ bestD=d; best=n; }
    }
    flashReceptor(dir);
    if(!best || bestD>GOOD) return;
    best.dead=true; best.el.remove();
    judged++; hits++; missStreak=0;
    let pts, label, col;
    if(bestD<=PERFECT){ pts=300; label='PERFECT!'; col='#ffe36b'; hitSound(true); }
    else { pts=150; label='GOOD'; col='#7ce7ff'; hitSound(false); }
    combo++;
    pts += combo*5;
    score+=pts;
    scoreEl.textContent=score;
    updateCombo(); updateAcc();
    showJudge(label,col);
    setPose(dir);
  }

  function flashReceptor(dir){
    const r=receptors[dir];
    r.classList.add('flash');
    clearTimeout(r._t);
    r._t=setTimeout(()=>r.classList.remove('flash'),120);
  }

  function start(){
    if(!AC) initAudio();
    if(AC.state==='suspended') AC.resume();
    reset();
    overlay.classList.add('hidden');
    finalEl.classList.add('hidden');
    running=true;
    FIELD_H = field.clientHeight;
    startTime = AC.currentTime;
    nextBeatTime = AC.currentTime + 0.1;
    rafId=requestAnimationFrame(loop);
  }

  function endGame(){
    running=false;
    cancelAnimationFrame(rafId);
    setPose('idle');
    const acc = judged?Math.round(hits/judged*100):100;
    let rank='NICE';
    if(acc>=95) rank='⭐ LENDA DO POP ⭐';
    else if(acc>=85) rank='SMOOTH CRIMINAL';
    else if(acc>=70) rank='MOONWALKER';
    else if(acc>=50) rank='THRILLER MEDIANO';
    else rank='PRECISA ENSAIAR 😅';
    finalEl.innerHTML =
      `<div class="big">${rank}</div>
       Pontuação: <b>${score}</b><br>
       Combo máximo: <b>${maxCombo}</b><br>
       Precisão: <b>${acc}%</b>`;
    finalEl.classList.remove('hidden');
    overlay.classList.remove('hidden');
    startBtn.textContent='JOGAR DE NOVO ▶';
  }

  const pressed={};
  window.addEventListener('keydown', e=>{
    const dir=KEYMAP[e.key];
    if(!dir) return;
    e.preventDefault();
    if(pressed[e.key]) return;
    pressed[e.key]=true;
    if(running) judgeHit(dir);
  });
  window.addEventListener('keyup', e=>{ pressed[e.key]=false; });

  document.querySelectorAll('.receptor').forEach(r=>{
    r.addEventListener('pointerdown', ()=>{ if(running) judgeHit(r.dataset.dir); });
  });

  startBtn.addEventListener('click', start);
})();
</script>
</body>
</html>
